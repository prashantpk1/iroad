{% load static %}
    <!-- Page Header Section Start -->
    <div
      class="page-header {{ page_header_kind }}-page-header bg-section parallaxie{% if page_header_background %} {{ page_header_kind }}-page-header--cms-bg{% endif %}"
      {% if page_header_background %}
      style="background-image: url('{{ page_header_background.url }}');"
      {% endif %}
    >
      <div class="container">
        <div class="row">
          <div class="col-lg-12">
            <!-- Page Header Box Start -->
            <div class="page-header-box">
              <h1>{{ page_h1 }}</h1>
              <nav class="wow fadeInUp" aria-label="breadcrumb">
                <ol class="breadcrumb">
                  <li class="breadcrumb-item">
                    <a href="{% url 'iroad_frontend:home' %}">
                      {{ breadcrumb_home_label }}
                    </a>
                  </li>
                  <li class="breadcrumb-item active" aria-current="page">
                    {{ breadcrumb_current }}
                  </li>
                </ol>
              </nav>
            </div>
            <!-- Page Header Box End -->
          </div>
        </div>
      </div>
    </div>
    <!-- Page Header Section End -->
